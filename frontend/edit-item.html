<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Item - Lost & Found</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="index.html">🔍 Lost & Found</a>
      </div>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Search Items</a></li>
        <li id="navAuth">
          <button onclick="window.location.href='login.html'" class="btn-login">Login</button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container" style="max-width: 800px; margin: 40px auto; padding: 20px;">
    <h1 style="text-align: center; color: #333; margin-bottom: 30px;">✏️ Edit Item</h1>

    <form id="editForm" style="background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
      <div class="form-group">
        <label for="title">Item Name *</label>
        <input type="text" id="title" name="title" required>
      </div>

      <div class="form-group">
        <label for="description">Item Description *</label>
        <textarea id="description" name="description" required></textarea>
      </div>

      <div class="form-group">
        <label for="category">Category *</label>
        <select id="category" name="category" required>
          <option value="">Select Category</option>
          <option value="accessories">Accessories</option>
          <option value="books">Books</option>
          <option value="documents">Documents</option>
          <option value="electronics">Electronics</option>
          <option value="clothing">Clothing</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="location">Location *</label>
        <input type="text" id="location" name="location" placeholder="Where did you lose/find it?" required>
      </div>

      <div class="form-group">
        <label for="image">Item Photo (Optional)</label>
        <input type="file" id="image" name="image" accept="image/*">
        <small>Supported: JPG, PNG, GIF (Max 2MB)</small>
      </div>

      <div id="successMessage" class="alert alert-success" style="display:none; margin-bottom: 15px;"></div>
      <div id="errorMessage" class="alert alert-error" style="display:none; margin-bottom: 15px;"></div>

      <div style="display: flex; gap: 10px; justify-content: center;">
        <button type="submit" class="btn-primary" style="padding: 12px 30px; font-size: 16px;">Save Changes</button>
        <button type="button" onclick="window.location.href='dashboard.html'" class="btn-secondary" style="padding: 12px 30px; font-size: 16px; background: #999;">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Footer -->
  <footer style="background: #333; color: white; text-align: center; padding: 20px; margin-top: 40px;">
    <p>&copy; 2024 Campus Lost & Found Portal. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    let itemId = null;

    async function loadItemForEdit() {
      const urlParams = new URLSearchParams(window.location.search);
      itemId = urlParams.get('id');

      if (!itemId || itemId === 'undefined') {
        alert('Item not found');
        window.location.href = 'dashboard.html';
        return;
      }

      try {
        const response = await fetch(`${API_URL}/items/${itemId}`);
        if (!response.ok) throw new Error('Item not found');
        const item = await response.json();

        // Check if current user is the owner
        const user = getUser();
        
        console.log('Edit authorization check:');
        console.log('  item.postedBy:', item.postedBy, typeof item.postedBy);
        console.log('  user.id:', user?.id, typeof user?.id);
        console.log('  Match:', item.postedBy == user?.id);
        
        if (!user) {
          alert('Please login first');
          window.location.href = 'login.html';
          return;
        }
        
        // Convert to numbers for proper comparison (handle both string and number IDs)
        const itemOwnerID = Number(item.postedBy);
        const currentUserID = Number(user.id);
        
        if (itemOwnerID !== currentUserID) {
          alert('You can only edit your own items');
          window.location.href = 'dashboard.html';
          return;
        }

        // Fill the form
        document.getElementById('title').value = item.title;
        document.getElementById('description').value = item.description;
        document.getElementById('category').value = item.category;
        document.getElementById('location').value = item.location;
      } catch (error) {
        alert('Error loading item: ' + error.message);
        window.location.href = 'dashboard.html';
      }
    }

    // Convert image file to base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const user = getUser();
      if (!user) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
      }

      const title = document.getElementById('title').value;
      const description = document.getElementById('description').value;
      const category = document.getElementById('category').value;
      const location = document.getElementById('location').value;
      const imageFile = document.getElementById('image').files[0];

      try {
        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('successMessage').style.display = 'none';

        let updateData = {
          title,
          description,
          category,
          location,
        };

        // Only include image if a new one was selected
        if (imageFile) {
          updateData.image = await fileToBase64(imageFile);
        }

        const response = await fetch(`${API_URL}/items/${itemId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getToken()}`,
          },
          body: JSON.stringify(updateData),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to update item');
        }

        document.getElementById('successMessage').textContent = '✅ Item updated successfully!';
        document.getElementById('successMessage').style.display = 'block';

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      } catch (error) {
        document.getElementById('errorMessage').textContent = '❌ ' + error.message;
        document.getElementById('errorMessage').style.display = 'block';
      }
    });

    // Load item on page load
    window.addEventListener('load', loadItemForEdit);
  </script>
</body>
</html>
